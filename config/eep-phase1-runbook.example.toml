# EEP Phase 1 runbook example. This is schema/load validation input only.
# It is not a production secret file and must not be used to start a service.

[deployment]
mode = "production"

[kernel.data_space]
data_space_id = "space:personal-primary"
owner_id = "owner:primary"
kind = "personal"
lethe_location = "http://host.docker.internal:8080/lakes/personal-primary"

[kernel.lethe]
base_url = "http://host.docker.internal:8080"
bearer_token_env = "LETHE_NANIHOLD_TOKEN"
timeout_seconds = 30.0
max_page_size = 500
history_max_result_bytes = 24000

[kernel.audit_policy]
policy_id = "policy:audit-primary"
data_space_id = "space:personal-primary"
independent_s3_star_required = true
raw_drill_down_required = true
retention_days = 3650

[kernel.control_policy]
policy_id = "policy:control-primary"
data_space_id = "space:personal-primary"
stop_scope = "affected_work_and_effects"
severe_finding_requires_s5_risk_acceptance = true
completion_requires_remote_push = true

[pilot]
mode = "sandboxed_bypass"
permission_classifier_enabled = false
writes_allowed = true
pilot_host_id = "pilot-host:interface-primary"

channels = []

[server]
bind_addr = "0.0.0.0:8080"
mcp_bind_addr = "0.0.0.0:8090"

[mcp]
resource_url = "https://mcp.local.invalid/mcp"
protected_resource_metadata_url = "https://mcp.local.invalid/.well-known/oauth-protected-resource"
oauth_issuer = "https://issuer.local.invalid/"
oauth_audience = "lethe-local-verification"
oauth_jwks_path = "/etc/lethe/mcp-jwks.json"

[storage]
database_path = "/var/lib/lethe/data/lethe.sqlite3"
blob_dir = "/var/lib/lethe/data/blobs"
encryption_key_env = "LETHE_STORAGE_ENCRYPTION_KEY"

[operational_ledger]
backend = "sqlite"
data_space_id = "space:local-verification"
database_path = "/var/lib/lethe/data/local-operational.sqlite3"
blob_dir = "/var/lib/lethe/data/local-operational-blobs"
encryption_key_env = "LETHE_OPERATIONAL_STORAGE_ENCRYPTION_KEY"

[routing]
key_order = "year_month_source_container_published"

[runtime]
poll_seconds = 300

[limits]
max_blob_bytes = 10485760
max_payload_bytes = 1048576
max_sync_items = 10000
max_page_size = 100
max_leaf_observations = 100000
retention_days = 30

[corpus]
mode = "personal_all_text"
index_dir = "/var/lib/lethe/data/corpus-index"
writer_heap_bytes = 33554432
rebuild_page_size = 512

[freshness.threshold_seconds]
"sys:nanihold-local-verification" = 300

[ops]
backfill_nightly_budget_items = 10000

[supplemental]
reject_unregistered_kinds = true

[[api_tokens]]
token_env = "LETHE_NANIHOLD_TOKEN"
scopes = ["read:operational", "write:operational"]

[[api_tokens]]
token_env = "LETHE_API_READ_TOKEN"
scopes = ["read:corpus", "read:operational"]

[[api_tokens]]
token_env = "LETHE_API_WRITE_TOKEN"
scopes = ["write:observations", "write:supplemental", "write:operational"]

[[api_tokens]]
token_env = "LETHE_API_SYNC_TOKEN"
scopes = ["admin:sync", "admin:health"]

[sources]
slack = []
google_slides = []

# This file is a schema template, not a production routing decision.
# Replace every EXAMPLE benchmark result with versioned, verified evidence before
# publishing the RouteSnapshot. Nanihold intentionally refuses missing fields.

[deployment]
mode = "production"

[kernel.data_space]
data_space_id = "space:personal-primary"
owner_id = "owner:primary"
kind = "personal"
lethe_location = "https://lethe.example.invalid/lakes/personal-primary"

[kernel.lethe]
base_url = "https://lethe.example.invalid"
bearer_token_env = "LETHE_BEARER_TOKEN"
timeout_seconds = 30.0
max_page_size = 100
history_max_result_bytes = 24000

[kernel.audit_policy]
policy_id = "policy:audit-primary"
data_space_id = "space:personal-primary"
independent_s3_star_required = true
raw_drill_down_required = true
retention_days = 3650

[kernel.control_policy]
policy_id = "policy:control-primary"
data_space_id = "space:personal-primary"
stop_scope = "affected_work_and_effects"
severe_finding_requires_s5_risk_acceptance = true
completion_requires_remote_push = true

[pilot]
mode = "sandboxed_bypass"
permission_classifier_enabled = false
writes_allowed = true
pilot_host_id = "pilot-host:primary"
device_id = "device:primary"
device_certificate_sha256 = "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

[pilot.sandbox]
profile_id = "sandbox:primary"
certificate_file = "/run/secrets/nanihold-sandbox-profile"
certificate_sha256 = "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
filesystem_write_roots = ["/workspace"]
network_destinations = ["github.com", "api.anthropic.com", "api.openai.com"]
issued_at = 2026-07-19T00:00:00Z
expires_at = 2027-07-19T00:00:00Z

[environment_contract]
supported_shells = ["powershell", "posix"]
workspace_writable = true
minimum_memory_mb = 4096
supported_sandboxes = ["read-only", "workspace-write"]
required_sandbox = "workspace-write"
path_mapping_names = ["workspace-root"]

[environment_contract.adapters."codex-cli"]
required_endpoints = ["api.openai.com"]
minimum_cli_version = "0.144.5"

[environment_contract.adapters."claude-code"]
required_endpoints = ["api.anthropic.com"]
minimum_cli_version = "2.1.215"

[interface_pilot]
node_id = "node:owner-interface"
pilot_id = "pilot:interface"
adapter = "claude-code"
adapter_version = "1.0.0"
provider = "anthropic"
model_selection = "provider_configured"
effort = "high"
toolset = ["nanihold-api"]
sandbox_fingerprint = "sandbox-profile-sha256:replace"
environment_fingerprint = "environment-contract-sha256:54d140bc34f8d884f4dd8c7746f927a721fadb5472fdc99db511d555a9a8b0e6"
pilot_host_base_url = "https://pilot-host.example.invalid"
pilot_host_bearer_token_env = "PILOT_HOST_BEARER_TOKEN"
timeout_seconds = 120.0

[production_pilot_host]
coding_pilot_id = "pilot:codex-coding-s1"
coding_candidate_model_snapshot = "gpt-5.6-luna"
agent_name_csv_path = "/opt/nanihold-assets/Agent_name.csv"
interface_max_budget_usd = 5.0
transport_timeout_seconds = 330.0
work_cwd = "/workspace"
work_sandbox = "workspace-write"
work_max_input_tokens = 10000
work_max_output_tokens = 2000
work_max_total_tokens = 12000
work_timeout_seconds = 300.0
max_parallelism = 3
reorientation_max_tool_rounds = 8
preflight_enabled = true
preflight_cli_version_files = { "codex-cli" = "/usr/local/lib/node_modules/@openai/codex/package.json", "claude-code" = "/usr/local/lib/node_modules/@anthropic-ai/claude-code/package.json" }
preflight_cache_path = "/var/lib/nanihold-pilot/preflight-cache.json"
preflight_instance_fingerprint = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

[routing]
active_route_snapshot_id = "route:coding-production"
expected_utility_quality_weight = 10.0
expected_utility_cost_weight = 1.0
expected_utility_latency_weight = 0.001
production_exploration_enabled = false

[[routing.candidates]]
[routing.candidates.candidate]
adapter = "claude-code"
adapter_version = "1.0.0"
provider = "anthropic"
selection = "provider_configured"
effort = "high"

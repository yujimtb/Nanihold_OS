name: Test

on:
  push:
  pull_request:

jobs:
  logic-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build deterministic test images
        run: docker compose --profile runtime build app web

      - name: Run logic, fake, and golden tests
        run: docker compose run --rm app python -m pytest -q

      - name: Build WebUI
        run: docker compose --profile runtime run --rm --no-deps web npm run build

      - name: Check CLI surface
        run: docker compose run --rm app vsm --help

      - name: Run independent deterministic S3* gate
        run: docker compose run --rm app python tools/s3star_gate.py

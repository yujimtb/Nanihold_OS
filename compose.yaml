services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - .:/workspace:cached
      - ../_cutover_20260720_fable_activation/asset/Agent_name.csv:/opt/nanihold-assets/Agent_name.csv:ro

  api:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command: vsm serve --config /workspace/vsm.toml
    env_file:
      - path: .env
        required: true
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace:cached
      - ../_cutover_20260720_fable_activation/asset/Agent_name.csv:/opt/nanihold-assets/Agent_name.csv:ro
    profiles: ["runtime"]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /workspace
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/workspace:cached
      - frontend_node_modules:/workspace/node_modules
    depends_on:
      - api
    profiles: ["runtime"]

volumes:
  frontend_node_modules:
